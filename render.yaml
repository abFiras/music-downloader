services:
  - type: web
    name: batchbeat
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.20"
      # Set these in the Render dashboard (Secrets):
      # YTDLP_COOKIES_CONTENT_B64
      # YTDLP_PROXY
      # YTDLP_PO_TOKEN
      # YTDLP_VISITOR_DATA
